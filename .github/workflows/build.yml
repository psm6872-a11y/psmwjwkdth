name: Android CI/CD Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Parse Version Name
        id: version_parse
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F '"' '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Parsed version: v$VERSION_NAME"

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Signed Release APK & AAB
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SPREADSHEET_WEB_APP_URL: ${{ secrets.SPREADSHEET_WEB_APP_URL }}
        run: |
          ./gradlew assembleRelease bundleRelease -q
          echo "Signing config: release ✅"
          echo "keyAlias: $KEY_ALIAS ✅"

      - name: Create GitHub Release and Upload APK & AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          name: Release v${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Firebase Remote Config
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json

          CLIENT_EMAIL=$(python3 -c "
          import json
          with open('sa.json') as f:
              sa = json.load(f)
          print(sa['client_email'])
          ")

          PRIVATE_KEY=$(python3 -c "
          import json
          with open('sa.json') as f:
              sa = json.load(f)
          print(sa['private_key'])
          ")

          rm -f sa.json
          echo "$PRIVATE_KEY" > sa_key.pem

          HEADER_JSON='{"alg":"RS256","typ":"JWT"}'
          NOW=$(date +%s)
          EXP=$((NOW + 3600))
          PAYLOAD_JSON=$(cat <<EOF
          {
            "iss": "$CLIENT_EMAIL",
            "scope": "https://www.googleapis.com/auth/firebase.remoteconfig",
            "aud": "https://oauth2.googleapis.com/token",
            "exp": $EXP,
            "iat": $NOW
          }
          EOF
          )

          b64url() {
            openssl enc -base64 -A | tr -d '=' | tr '/+' '_-'
          }

          HEADER_B64=$(echo -n "$HEADER_JSON" | b64url)
          PAYLOAD_B64=$(echo -n "$PAYLOAD_JSON" | b64url)
          HEADER_PAYLOAD="${HEADER_B64}.${PAYLOAD_B64}"
          SIGNATURE_B64=$(echo -n "$HEADER_PAYLOAD" | openssl dgst -sha256 -sign sa_key.pem | b64url)
          rm -f sa_key.pem

          JWT="${HEADER_PAYLOAD}.${SIGNATURE_B64}"
          ACCESS_TOKEN=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:jwt-bearer\",\"assertion\":\"$JWT\"}" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to obtain Access Token from Google OAuth."
            exit 1
          fi

          ETAG=$(curl -s -D - "https://firebaseremoteconfig.googleapis.com/v1/projects/danalla-calendar/remoteConfig" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            | grep -i etag | awk '{print $2}' | tr -d '\r\n')

          if [ -z "$ETAG" ]; then
            ETAG="*"
          fi

          curl -s "https://firebaseremoteconfig.googleapis.com/v1/projects/danalla-calendar/remoteConfig" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -o config.json

          python3 -c "
          import json
          with open('config.json', 'r') as f:
              config = json.load(f)
          if 'parameters' not in config:
              config['parameters'] = {}
          
          # Update latest_version parameter preserving/adding valueType
          if 'latest_version' not in config['parameters']:
              config['parameters']['latest_version'] = {}
          config['parameters']['latest_version']['valueType'] = 'STRING'
          config['parameters']['latest_version']['defaultValue'] = {'value': '${{ env.VERSION_NAME }}'}
          
          # Update apk_download_url parameter preserving/adding valueType
          if 'apk_download_url' not in config['parameters']:
              config['parameters']['apk_download_url'] = {}
          config['parameters']['apk_download_url']['valueType'] = 'STRING'
          config['parameters']['apk_download_url']['defaultValue'] = {'value': 'https://github.com/psm6872-a11y/psmwjwkdth/releases/download/v${{ env.VERSION_NAME }}/app-release.apk'}
          
          with open('config.json', 'w') as f:
              json.dump(config, f)
          "

          curl -f -X PUT "https://firebaseremoteconfig.googleapis.com/v1/projects/danalla-calendar/remoteConfig" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json; UTF-8" \
            -H "If-Match: $ETAG" \
            -d @config.json

      - name: Install Firebase Functions Dependencies
        run: |
          cd functions
          npm install

      - name: Deploy Firebase Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          npx firebase-tools deploy --only functions --project danalla-calendar
          rm sa.json


